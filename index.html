<!DOCTYPE html>

  </head>
  <body>
    <header>
      <h1>File Upload Example</h1>
    </header>
    <main>
      <section id="drop-area">
        <p>Drag and drop a file here</p>
      </section>
      <section id="file_list">
        <p>Uploaded File list</p>
      </section>
    </main>
    <aside>
        <div id="funcion_list">
            <section class="funBtn">
                <p>extract_text</p>
            </section>

                <p>extract_images</p>

                <p>split_pages_pdf</p>
            </section>

                <p>merge_pdf</p>
            </section>

                <p>encrypt_pdf</p>

    <footer>
      <p>Copyright © 2023</p>
    </footer>
    <script src="script.js"></script>

</html>
